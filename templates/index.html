<!DOCTYPE html>
<html>
<head>
    <title>Mushroom Card Game</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    
    <div class="container">

        <h1>🃏 Ngou! 🐮</h1>

            <form method="POST" id="gameForm">

                <div class="card-grid" id="cardGrid">

                    <div class="card" data-value="A">A</div>
                    <div class="card" data-value="2">2</div>
                    <div class="card" data-value="3">3</div>
                    <div class="card" data-value="4">4</div>
                    <div class="card" data-value="5">5</div>
                    <div class="card" data-value="6">6</div>
                    <div class="card" data-value="7">7</div>
                    <div class="card" data-value="8">8</div>
                    <div class="card" data-value="9">9</div>
                    <div class="card" data-value="10">10</div>
                    <div class="card" data-value="J">J</div>
                    <div class="card" data-value="Q">Q</div>
                    <div class="card" data-value="K">K</div>

                </div>

                <!-- hidden fields -->
                <input type="hidden" name="card1" id="card1">
                <input type="hidden" name="card2" id="card2">
                <input type="hidden" name="card3" id="card3">
                <input type="hidden" name="card4" id="card4">
                <input type="hidden" name="card5" id="card5">
                <div class="ace-toggle">
                    <label>
                        <input type="checkbox" name="mushroom" value="yes">
                        Do you have A♠?
                    </label>
                </div>

                <button type="submit">Play</button>

            </form>
        <div class="hand-preview">
            <div class="slot" id="slot0"></div>
            <div class="slot" id="slot1"></div>
            <div class="slot" id="slot2"></div>
            <div class="slot" id="slot3"></div>
            <div class="slot" id="slot4"></div>
        </div>
        {% if result %}
        <div class="result-box">
            <h2>Result</h2>
            <pre>{{ result }}</pre>
        </div>
        {% endif %}

    </div>
    <script>
        let selected = [];

        const cards = document.querySelectorAll(".card");

        cards.forEach(card => {
            card.addEventListener("click", () => {

                const value = card.dataset.value;

                if (selected.length >= 5) return;

                const copies = selected.filter(c => c === value).length;

                if (copies >= 4) {
                    alert("Only 4 copies of each card exist in the deck.");
                    return;
                }

                selected.push(value);

                updatePreview();
                updateInputs();
            });
        });

        function updatePreview() {
            for (let i = 0; i < 5; i++) {
                document.getElementById("slot" + i).textContent = selected[i] || "";
            }
        }

        function updateInputs() {
            for (let i = 0; i < 5; i++) {
                document.getElementById("card" + (i+1)).value = selected[i] || "";
            }
        }
    </script>
</body>
</html>
